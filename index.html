<!DOCTYPE html>
<html>

  <head>
    <title>Todo App</title>
    <link href="https://fonts.googleapis.com/css?family=Lato:300,400,700" 
        rel="stylesheet" 
        type="text/css">
    <link rel="stylesheet" href="style.css" media="screen" charset="utf-8">
  </head>

  <body>
    <header class="header">
        <img class="header__image" src="./eisenhower-matrix.jpg" alt="Eisenhower-matrix image">
        <a class="header__ref" href="https://goal-life.com/page/method/matrix-eisenhower">Want more details?</a>
    </header>
    
    <main class="main-page"><!--ex centered-main-page-element-->
     
      <div class="add-task">
        <p class="add-task__input"><!--ex centered-main-page-element-->
          <label for="new-task">Add Item</label><input id="new-task" type="text"><button>Add</button>
        </p>
      </div>
      
      <div class="todo">
        <div class="todo__title">
          <h3>Todo</h3>
        </div>
        <div class="incomplete-tasks">
          <ul class="tasks"> <!--incompleteTasks-->
            <li class="tasks__item"><input type="checkbox"><label class="task">Pay Bills</label><input type="text"><button class="edit">Edit</button><button class="delete"><img src="./remove.svg"></button></li>
            <li class="tasks__item editMode">
              <input type="checkbox"><label class="task">Go Shopping</label><input type="text" value="Go Shopping" class="task"><button class="edit">Save</button><button class="delete"><img src="./remove.svg"></button></li>
          </ul>
        </div>   
      </div>
      
      <div class="comleted-tasks">
        <div class="comleted-tasks__title">
          <h3>Completed</h3>
        </div>

        <div class="comleted-tasks__list">
          <ul class="comleted-list"><!--completed-tasks-->
            <li class="comleted-list__item"><input type="checkbox" checked><label class="task">See the Doctor</label><input type="text"><button class="edit">Edit</button><button class="delete"><img src="./remove.svg"></button></li>
          </ul>
        </div>
        
      </div>
      

      </main>
    <script src="app.js"></script>
  </body>
</html>
